<!DOCTYPE html>
<html>
    <head>
        <title>Login page</title>
        <link rel="stylesheet" type="text/css" href="./assets/css/rootStyles.css">
        <style>
            body{
                background: #000;
            }
            #mainDiv{
                display: flex;
                flex-direction: row;
                width: 100vw;
                height: 100vh;
                justify-content:center;
                align-items:center;
                gap: 10px;
                z-index:0;
            }
            #loginDiv{
                display: grid;
                background-color: blue;
                width: 30vw;
                height: 95vh;
                z-index: 1;
            }
            #innerLogin{
                display: flex;
                flex-direction: column;
                justify-content:center;
                align-items:center;
                gap:10px;
            }
            #carouselDiv{
                background-color: greenyellow;
                border-radius: 30px;
                width: 60vw;
                height: 95vh;
                z-index: 1;
            }
            input[type="text"],
            input[type="password"]{
                border-radius: 10px;
                height: 6vh;
                width: 95%;
            }
            input[type="button"]{
                width: 80%;
                height: 4vh;
                text-overflow: clip;
                border-radius: 10px;
                box-shadow: #000;
            }
        </style>
    </head>
    <body>
        <div id="mainDiv">
            <div id="loginDiv">
                <div id="innerLogin">
                    <h1>Sentinel Flow</h1>
                    <label>Username:</label>
                    <input type="text" placeholder="Enter your username"/>
                    <label>Password:</label>
                    <input type="password" placeholder="Enter your password"/>
                    <input type="button" value="Log in"/>
                </div>
            </div>        
    
            <div id="carouselDiv">

            </div>
        </div>
    </body>
</html>
